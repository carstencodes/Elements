name: Pack projects to NuGet Packages

on:
  push:
    branches:
      - main
    tags:
      - v*

permissions:
  packages: write
  contents: read

jobs:
  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    environment:
      name: nuget
      deployment: false

    steps:
      - name: Checkout
        uses: actions/checkout@7
      - name: Build
        uses: ./.github/actions/build
        with:
          configuration: Release
      - name: Pack items
        run: dotnet pack --no-restore --no-build -c Release
      - name: Determine trigger
        id: event_trigger
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "target=nuget" >> $GITHUB_OUTPUT
          else
            echo "target=github" >> $GITHUB_OUTPUT
          fi
      - name: Publish to GitHub Packages
        if: ${{ !(startsWith( github.ref, 'refs/tags/v' )) }}
        run: |
          dotnet nuget push ./artifacts/package/release/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          dotnet nuget push ./artifacts/package/release/*.snupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      - name: NuGet login (OIDC → temp API key)
        if: ${{ startsWith( github.ref, 'refs/tags/v' ) }}
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ github.repository_owner }}
      - name: Publish to nuget.org
        if: ${{ startsWith( github.ref, 'refs/tags/' ) }}
        run: |
          dotnet nuget push ./artifacts/package/release/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json
          dotnet nuget push ./artifacts/package/release/*.snupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json
