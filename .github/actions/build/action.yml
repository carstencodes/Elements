name: Restore packages and build projects
description: Run dotnet restore and dotnet build for a certain configuration
inputs:
  configuration:
    description: One of Debug or Release
    required: true
    type: string
    default: Release
  global_json:
    description: Path to the global.json file
    required: false
    type: string
    default: global.json
  tool_restore:
    description: Run tool restore
    required: false
    type: bool
    default: true

runs:
  using: "composite"
  steps:
    - name: Setup dotnet
      uses: actions/setup-dotnet@v6
      with:
        global-json-file: ${{ inputs.global_json }}
    - name: Restore tools using manifest
      shell: sh
      if: ${{ inputs.tool_restore }}
      run: dotnet tool restore
    - name: Restore packages
      shell: sh
      run: dotnet restore --no-http-cache --force --use-lock-file --locked-mode
    - name: Build project
      shell: sh
      run: dotnet build --no-restore --configuration ${{ inputs.configuration }}
